<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 350px;
        }
        .upload-box {
            border: 20px dashed #ccc;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .upload-box:hover {
            border-color: #007bff;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
        #fileName {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }
        #status {
            margin-top: 10px;
            font-weight: bold;
        }
        
        .loading {
            color: orange;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Upload Your Resume</h2>
        <div class="upload-box" onclick="document.getElementById('resumeFile').click()">
            Click or Drag & Drop Resume (PDF only)
            <input type="file" id="resumeFile" accept=".pdf" hidden />
        </div>

        <div id="fileName"></div>

        <button onclick="uploadResume()">Upload</button>
        <p id="status"></p>
        
    </div>

    <script>
        const fileInput = document.getElementById("resumeFile");
        const fileNameDisplay = document.getElementById("fileName");
        fileInput.addEventListener("change",()=>{
            const file = fileInput.files[0];
            if(file){
                fileNameDisplay.innerText = "Selected: " + file.name;
            }
        });

        async function uploadResume() {
            console.log("Button clicked");
            const file = fileInput.files[0];

            if(!file){
                alert("Please select a file");
                return;
            }

            if (file.type!=="application/pdf"){
                alert("Only PDF files are allowed");
                return;
            }

            if(file.size >2 *1024 *1024){
                alert("File size should be less than 2MB");
                return;
            }

            const status = document.getElementById("status");
            status.className = "loading";
            status.innerText = "Uploading...";

            const formData = new FormData();
            formData.append("file",file);
            try {
                const response = await fetch("/upload-resume",{
                    method:"POST",
                    body: formData
                });
                const data = await response.json();
                if(data.error) {
                    status.className = "error";
                    status.innerText = data.error;
                } else{
                    status.className = "success";
                    status.innerText = "Resume uploaded successfully";

                    
                }
            } catch (err) {
                status.className = "error";
                status.innerText = "Upload failed";
            }
        }
    </script>
</body>
</html>
