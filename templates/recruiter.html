<!DOCTYPE html>
<html>
<head>
<title>AI JD Generator</title>

<style>
body{
font-family: Arial;
max-width: 800px;
margin: auto;
padding: 40px;
}

input, textarea{
width: 100%;
padding: 10px;
margin-top: 8px;
margin-bottom: 20px;
}

button{
padding: 10px 20px;
background: black;
color: white;
border: none;
margin-right: 10px;
cursor: pointer;
}

button:disabled{
background: gray;
cursor: not-allowed;
}

#reject-form{
border-top:1px solid #ccc;
padding-top:20px;
margin-top:20px;
}
</style>

</head>

<body>

<h2>AI Job Description Generator</h2>

<p id="status"></p>
<form id="jdForm">

<label>Job Title</label>
<input type="text" name="title" required>

<label>Skills</label>
<input type="text" name="skills" required>

<label>Experience</label>
<input type="text" name="experience" required>

<button id="generateBtn" type="submit">Generate JD</button>

</form>

<h3>Generated JD</h3>

<textarea id="jdOutput" rows="15" placeholder="Generated job description will appear here..."></textarea>

<button id="approveBtn" onclick="approveJD()">Approve JD</button>
<button id="rejectBtn" onclick="showRejectForm()" disabled>Reject</button>
<button onclick="copyJD()">Copy JD</button>
<button onclick="clearJD()">Clear</button>

<div id="reject-form" style="display:none;">

<h4>Describe required changes</h4>

<textarea id="feedback" placeholder="Example: Add responsibilities about cloud deployment and microservices"></textarea>

<button id="submitFeedbackBtn" onclick="submitFeedback()">Submit Changes</button>

</div>

<h3>Saved Job Descriptions</h3>
<button onclick="loadJDs()">Load Saved JDs</button>

<ul id="jdList"></ul>


<h3>Candidates</h3>

<button onclick="loadCandidates()">Load Candidates</button>

<div id="candidateList"></div>

<h3>Ranked Candidates</h3>
<button onclick="matchAllCandidates()">Match all Candidates</button>
<div id="rankingResults" style="margin-top: 20px;"></div>

<script>

const jdOutput = document.getElementById("jdOutput")
const generateBtn = document.getElementById("generateBtn")
const approveBtn = document.getElementById("approveBtn")
const submitFeedbackBtn = document.getElementById("submitFeedbackBtn")
const rejectBtn = document.getElementById("rejectBtn")
const statusText = document.getElementById("status")

// Generate JD
document.getElementById("jdForm").addEventListener("submit", async function(e){

e.preventDefault()

generateBtn.disabled = true
rejectBtn.disabled = true

jdOutput.value = ""
statusText.innerText = " Generating JD..."


const title = document.querySelector('input[name="title"]').value
const skills = document.querySelector('input[name="skills"]').value
const experience = document.querySelector('input[name="experience"]').value

const eventSource = new EventSource(
    
    `/generate-jd-stream?title=${encodeURIComponent(title)}&skills=${encodeURIComponent(skills)}&experience=${encodeURIComponent(experience)}`
)

eventSource.onmessage = function(event){
    jdOutput.value+=event.data
}
eventSource.onerror = function(){
    eventSource.close()
    generateBtn.disabled = false
    rejectBtn.disabled  = false
    statusText.innerText = "JD generated successfully"
}

})


// Approve JD
async function approveJD(){

const jdText = jdOutput.value

if(!jdText || jdText.includes("Generating") || jdText.includes("Regenerating")){
alert("Please generate a JD first.")
return
}

approveBtn.disabled = true

try{

let response = await fetch("/approve-jd",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
jd:jdText
})
})

let data = await response.json()

alert(data.message)

}catch(error){

alert("Error saving JD.")

}

approveBtn.disabled = false

}


// Show reject form
function showRejectForm(){

if(!jdOutput.value){
alert("Generate a JD first.")
return
}

const form = document.getElementById("reject-form")
form.style.display = "block"

document.getElementById("feedback").focus()
form.scrollIntoView({behavior: "smooth"})

}


// Submit feedback
async function submitFeedback(){

const feedback = document.getElementById("feedback").value.trim()

if(!feedback){
alert("Please describe the changes required.")
return
}

const title = document.querySelector('input[name="title"]').value
const skills = document.querySelector('input[name="skills"]').value
const experience = document.querySelector('input[name="experience"]').value

submitFeedbackBtn.disabled = true

jdOutput.value =
"⏳ Regenerating JD using recruiter feedback...\n\nPlease wait..."

const formData = new FormData()

formData.append("title",title)
formData.append("skills",skills)
formData.append("experience",experience)
formData.append("feedback",feedback)

try{

const response = await fetch("/revise-jd",{
method:"POST",
body:formData
})

const data = await response.json()

jdOutput.value = data.generated_jd
statusText.innerText = " JD regenerated with improvements"

// clear feedback
document.getElementById("feedback").value=""

// hide form
document.getElementById("reject-form").style.display="none"

}catch(error){

jdOutput.value = "Error regenerating JD. Please try again."

}

submitFeedbackBtn.disabled = false

}


// Load saved JDs
async function loadJDs(){

const response = await fetch("/get-jds")
const data = await response.json()

const jdList = document.getElementById("jdList")
jdList.innerHTML = ""

if(data.jds.length === 0){
jdList.innerHTML = "<p>No saved JDs yet.</p>"
return
}

data.jds.forEach(jd => {

const li = document.createElement("li")

li.innerHTML = `
<textarea rows="6" style="width:100%">${jd}</textarea>
<button onclick="useJD(this)">Use this JD</button>
<hr/>
`

jdList.appendChild(li)

})

}


// Use saved JD
function useJD(btn){
const jd = btn.previousElementSibling.value
jdOutput.value = jd
statusText.innerText = "📌 Loaded saved JD"
}


// Copy JD
function copyJD(){
navigator.clipboard.writeText(jdOutput.value)
alert("JD copied to clipboard")
}


// Clear JD
function clearJD(){
if(confirm("Are you sure you want to clear JD?")){
jdOutput.value = ""
statusText.innerText = ""
rejectBtn.disabled = true
}
}


async function loadCandidates(){

const response = await fetch("/candidates");
const data = await response.json();

const container = document.getElementById("candidateList");
container.innerHTML = "";

if(data.candidates.length === 0){
    container.innerHTML = "<p>No candidates yet.</p>";
    return;
}

data.candidates.forEach((c, index) => {

    const div = document.createElement("div");

    div.style.border = "1px solid #ccc";
    div.style.padding = "10px";
    div.style.marginBottom = "10px";

    div.innerHTML = `
        <b>Candidate ${index + 1}</b><br>
        <b>Resume:</b> ${c.filename}<br>
        <b>Skills:</b> ${c.skills.length ? c.skills.join(", ") : "No skills found"}<br>
        <div id="result-${index}" style="margin-top:10px;"></div>
    `;
    const btn = document.createElement("button");
    btn.innerText = "Match";

    btn.addEventListener("click",()=>{
        matchCandidate(c.filename,index);
    })
    div.appendChild(btn);
    
    const resultDiv = document.createElement("div");
    resultDiv.id = `result-${index}`;
    resultDiv.style.marginTop = "10px";

    div.appendChild(resultDiv);
    
    container.appendChild(div);

});
}
async function matchCandidate(filename, index) {

console.log("STEP 1: Function started");

const resultDiv = document.getElementById(`result-${index}`);
resultDiv.innerText = "⏳ Matching...";

try {

    console.log("STEP 2: Before fetch");

    const response = await fetch("/match-resume", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            filename: filename
        })
    });

    console.log("STEP 3: After fetch");

    const data = await response.json();


    if(data.error){
            resultDiv.innerText = ` ${data.error}`;
            return;
    }

    const matchedSkills = data.matched_skills.length?data.matched_skills.join(","):"None";
    const missingSkills = data.missing_skills.length?data.missing_skills.join(","):"None";
    resultDiv.innerHTML = `
        <b>Score:</b> ${data.score.toFixed(2)}<br>
        <b>Matched Skills:</b> ${matchedSkills}<br>
        <b>Missing Skills:</b> ${missingSkills}
    `;
} catch (error) {
    console.error("ERROR:", error);
    resultDiv.innerText = " Error matching candidate";
}
}

async function matchAllCandidates(){
    const rankingdiv = document.getElementById("rankingResults");
    rankingdiv.innerText = "Matching all the candidates..."
    try{
        const response = await fetch('/match-all');
        const data = await response.json()
        if(data.error){
        rankingdiv.innerText = `${data.error}`;
        return;
        }
        rankingdiv.innerHTML = "";
        data.results.forEach((candidate,index)=>{
            const div = document.createElement("div");

            div.style.border = "1px solid #ccc";
            div.style.padding = "10px";
            div.style.marginBottom = "10px";

            div.innerHTML = `
                <b>Rank:</b> ${index + 1}<br>
                <b>Resume:</b> ${candidate.filename}<br>
                <b>Score:</b> ${candidate.score.toFixed(2)}<br>
                <b>Matched Skills:</b> ${candidate.matched_skills.join(", ")}<br>
                <b>Missing Skills:</b> ${candidate.missing_skills.join(", ")}
            `;
            rankingdiv.appendChild(div);
        });
    }catch(error){
        rankingdiv.innerHTML = "<p>Error matching candidates</p>";
    }
    
}

</script>

</body>
</html>
