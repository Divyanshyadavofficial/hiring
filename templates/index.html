<!DOCTYPE html>
<html>
<head>
<title>AI JD Generator</title>

<style>

body{
font-family: Arial;
max-width: 800px;
margin: auto;
padding: 40px;
}

input, textarea{
width: 100%;
padding: 10px;
margin-top: 8px;
margin-bottom: 20px;
}

button{
padding: 10px 20px;
background: black;
color: white;
border: none;
margin-right: 10px;
cursor: pointer;
}

button:disabled{
background: gray;
cursor: not-allowed;
}

#reject-form{
border-top:1px solid #ccc;
padding-top:20px;
}

</style>

</head>

<body>

<h2>AI Job Description Generator</h2>

<form id="jdForm">

<label>Job Title</label>
<input type="text" name="title" required>

<label>Skills</label>
<input type="text" name="skills" required>

<label>Experience</label>
<input type="text" name="experience" required>

<button id="generateBtn" type="submit">Generate JD</button>

</form>

<h3>Generated JD</h3>

<textarea id="jdOutput" rows="15" placeholder="Generated job description will appear here..."></textarea>

<button id="approveBtn" onclick="approveJD()">Approve JD</button>
<button onclick="showRejectForm()">Reject</button>

<div id="reject-form" style="display:none;">

<h4>Describe required changes</h4>

<textarea id="feedback" placeholder="Example: Add responsibilities about cloud deployment and microservices"></textarea>

<button id="submitFeedbackBtn" onclick="submitFeedback()">Submit Changes</button>

</div>

<script>

const jdOutput = document.getElementById("jdOutput")
const generateBtn = document.getElementById("generateBtn")
const approveBtn = document.getElementById("approveBtn")
const submitFeedbackBtn = document.getElementById("submitFeedbackBtn")

// Generate JD
document.getElementById("jdForm").addEventListener("submit", async function(e){

e.preventDefault()

generateBtn.disabled = true

jdOutput.value = "Generating JD...\n\nPlease wait..."

let formData = new FormData(this)

try{

let response = await fetch("/generate-jd",{
method:"POST",
body:formData
})

let data = await response.json()

jdOutput.value = data.jd

}catch(error){

jdOutput.value = "Error generating JD. Please try again."

}

generateBtn.disabled = false

})


// Approve JD
async function approveJD(){

const jdText = jdOutput.value

if(!jdText || jdText.includes("Generating") || jdText.includes("Regenerating")){
alert("Please generate a JD first.")
return
}

approveBtn.disabled = true

try{

let response = await fetch("/approve-jd",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
jd:jdText
})
})

let data = await response.json()

alert(data.message)

}catch(error){

alert("Error saving JD.")

}

approveBtn.disabled = false

}


// Show reject form
function showRejectForm(){

if(!jdOutput.value){
alert("Generate a JD first.")
return
}

document.getElementById("reject-form").style.display = "block"

}


// Submit feedback
async function submitFeedback(){

const feedback = document.getElementById("feedback").value.trim()

if(!feedback){
alert("Please describe the changes required.")
return
}

const title = document.querySelector('input[name="title"]').value
const skills = document.querySelector('input[name="skills"]').value
const experience = document.querySelector('input[name="experience"]').value

submitFeedbackBtn.disabled = true

jdOutput.value =
"Regenerating JD using recruiter feedback...\n\nPlease wait..."

const formData = new FormData()

formData.append("title",title)
formData.append("skills",skills)
formData.append("experience",experience)
formData.append("feedback",feedback)

try{

const response = await fetch("/revise-jd",{
method:"POST",
body:formData
})

const data = await response.json()

jdOutput.value = data.generated_jd

// clear feedback
document.getElementById("feedback").value=""

// hide form
document.getElementById("reject-form").style.display="none"

}catch(error){

jdOutput.value = "Error regenerating JD. Please try again."

}

submitFeedbackBtn.disabled = false

}

</script>

</body>
</html>
